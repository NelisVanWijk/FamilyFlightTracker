services:
  app:
    build: .
    environment:
      APP_PORT: 8080
      SQLITE_PATH: /data/family-flight-tracker.sqlite
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      ADMIN_NAME: ${ADMIN_NAME:-Family Admin}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      FLIGHT_PROVIDER: ${FLIGHT_PROVIDER:-adsblol}
      OPENSKY_CLIENT_ID: ${OPENSKY_CLIENT_ID:-}
      OPENSKY_CLIENT_SECRET: ${OPENSKY_CLIENT_SECRET:-}
      FLIGHTAWARE_API_KEY: ${FLIGHTAWARE_API_KEY:-}
      FR24_API_KEY: ${FR24_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
